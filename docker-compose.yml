version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: fraud_api
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model
      - ./src:/app/src
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka

  producer:
    build:
      context: .
      dockerfile: producer/Dockerfile
    container_name: fraud_producer
    volumes:
      - ./data:/app/data
      - ./producer:/app/producer
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    # Commented out by default so it doesn't spam logs automatically
    # command: ["python", "producer/producer.py"]

  consumer:
    build:
      context: .
      dockerfile: consumer/Dockerfile
    container_name: fraud_consumer
    volumes:
      - ./model:/app/model
      - ./src:/app/src
      - ./consumer:/app/consumer
      - ./reports:/app/reports
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      - kafka
    # Commented out by default
    # command: ["python", "consumer/consumer.py"]
